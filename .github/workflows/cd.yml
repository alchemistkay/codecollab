name: CD

on:
  push:
    branches: [main]

# Never cancel a deployment in progress
concurrency:
  group: cd-production
  cancel-in-progress: false

permissions:
  contents: read
  packages: write       # push images to GHCR
  id-token: write       # cosign keyless OIDC signing + SBOM attestation
  security-events: write # upload Trivy SARIF to GitHub Security tab

jobs:
  # ─────────────────────────────────────────────────────────────
  # BUILD → SCAN → PUSH
  # Each service runs in parallel via matrix.
  # Trivy must pass before images are pushed to the registry.
  # ─────────────────────────────────────────────────────────────
  build-scan-push:
    name: Build / Scan / Push — ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: frontend
            context: ./frontend
          - service: session-service
            context: ./services/session-service
          - service: execution-service
            context: ./services/execution-service
          - service: collaboration-service
            context: ./services/collaboration-service
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/codecollab/${{ matrix.service }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      # Build and load locally first — Trivy needs the image in the daemon
      - name: Build image (local daemon)
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          load: true
          tags: ghcr.io/${{ github.repository_owner }}/codecollab/${{ matrix.service }}:scan-${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      # Scan the locally built image — block on CRITICAL CVEs
      - name: Scan image for CVEs (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/codecollab/${{ matrix.service }}:scan-${{ github.sha }}
          format: sarif
          output: trivy-${{ matrix.service }}.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"          # fail build on CRITICAL
          ignore-unfixed: true    # skip CVEs with no available fix
          vuln-type: os,library

      - name: Upload Trivy SARIF to GitHub Security tab
        if: always() # upload even when scan fails so results are visible
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif
          category: trivy-${{ matrix.service }}

      # Only push to GHCR after Trivy passes
      - name: Push image to GHCR
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}

  # ─────────────────────────────────────────────────────────────
  # IMAGE SIGNING — keyless cosign via Sigstore OIDC
  # Creates a tamper-proof entry in the Rekor transparency log.
  # No secrets required — GitHub OIDC token is used automatically.
  # ─────────────────────────────────────────────────────────────
  sign-images:
    name: Sign Images (cosign / Sigstore)
    runs-on: ubuntu-latest
    needs: build-scan-push
    strategy:
      matrix:
        service:
          - frontend
          - session-service
          - execution-service
          - collaboration-service
    steps:
      - name: Compute short SHA
        id: short_sha
        run: echo "value=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - uses: sigstore/cosign-installer@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Sign image
        run: |
          cosign sign --yes \
            ghcr.io/${{ github.repository_owner }}/codecollab/${{ matrix.service }}:sha-${{ steps.short_sha.outputs.value }}
        env:
          COSIGN_EXPERIMENTAL: "1"

  # ─────────────────────────────────────────────────────────────
  # SBOM GENERATION — software bill of materials via syft
  # Uploaded as workflow artifacts (retained 90 days).
  # Provides software inventory for compliance and auditing.
  # ─────────────────────────────────────────────────────────────
  generate-sbom:
    name: Generate SBOM — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: build-scan-push
    strategy:
      matrix:
        service:
          - frontend
          - session-service
          - execution-service
          - collaboration-service
    steps:
      - name: Compute short SHA
        id: short_sha
        run: echo "value=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate SBOM (syft / SPDX)
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ github.repository_owner }}/codecollab/${{ matrix.service }}:sha-${{ steps.short_sha.outputs.value }}
          format: spdx-json
          artifact-name: sbom-${{ matrix.service }}.spdx.json
          output-file: sbom-${{ matrix.service }}.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.service }}
          path: sbom-${{ matrix.service }}.spdx.json
          retention-days: 90

  # ─────────────────────────────────────────────────────────────
  # DEPLOY — pull new images and restart services on production
  # Gated by a manual approval in the "production" environment.
  # Configure: GitHub repo → Settings → Environments → production
  #   → Required reviewers: AlchemistKay
  # ─────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [sign-images, generate-sbom]
    environment:
      name: production
      url: https://codecollab.k4scloud.com
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          script: |
            set -e
            cd ~/projects/codecollab/infrastructure/production
            docker compose pull
            docker compose up -d --remove-orphans
            docker system prune -f --volumes=false
            echo "Deployment complete — $(date -u)"

  # ─────────────────────────────────────────────────────────────
  # SMOKE TESTS — verify all services are healthy post-deploy
  # Marks the deployment failed if any health check doesn't pass.
  # ─────────────────────────────────────────────────────────────
  smoke-test:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Run health checks
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          script: |
            set -e

            echo "Waiting 20s for containers to stabilise..."
            sleep 20

            echo "--- Session Service ---"
            curl -sf http://localhost:8001/health \
              | grep -q '"status":"healthy"' \
              && echo "OK" || (echo "FAIL" && exit 1)

            echo "--- Execution Service ---"
            curl -sf http://localhost:8002/health \
              | grep -q '"status":"healthy"' \
              && echo "OK" || (echo "FAIL" && exit 1)

            echo "--- Collaboration Service ---"
            curl -sf http://localhost:8003/health \
              | grep -q '"status":"healthy"' \
              && echo "OK" || (echo "FAIL" && exit 1)

            echo "--- Frontend (public HTTPS) ---"
            HTTP_CODE=$(curl -sk -o /dev/null -w "%{http_code}" https://codecollab.k4scloud.com)
            [ "$HTTP_CODE" = "200" ] \
              && echo "OK (HTTP $HTTP_CODE)" || (echo "FAIL (HTTP $HTTP_CODE)" && exit 1)

            echo "All smoke tests passed."
