apiVersion: v1
kind: Service
metadata:
  name: session-service
  namespace: codecollab
spec:
  type: NodePort
  selector:
    app: session-service
  ports:
  - port: 8001
    targetPort: 8001
    nodePort: 30001
    name: http
---
apiVersion: v1
kind: Service
metadata:
  name: execution-service
  namespace: codecollab
spec:
  type: NodePort
  selector:
    app: execution-service
  ports:
  - port: 8002
    targetPort: 8002
    nodePort: 30002
    name: http
---
apiVersion: v1
kind: Service
metadata:
  name: collaboration-service
  namespace: codecollab
spec:
  type: NodePort
  selector:
    app: collaboration-service
  ports:
  - port: 8003
    targetPort: 8003
    nodePort: 30003
    name: http
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: codecollab
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30080
    name: http
