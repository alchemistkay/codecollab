apiVersion: v1
kind: ResourceQuota
metadata:
  name: codecollab-quota
  namespace: codecollab
spec:
  hard:
    # Compute resources
    requests.cpu: "4"
    requests.memory: "8Gi"
    limits.cpu: "8"
    limits.memory: "16Gi"
    
    # Object counts
    pods: "50"
    services: "20"
    configmaps: "20"
    secrets: "20"
    persistentvolumeclaims: "10"
