services:
  codecollab-router:
    image: traefik/whoami
    networks:
      - traefik-network
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-network"
      
      # Frontend
      - "traefik.http.routers.codecollab-frontend.rule=Host(`codecollab.k4scloud.com`)"
      - "traefik.http.routers.codecollab-frontend.entrypoints=websecure"
      - "traefik.http.routers.codecollab-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.routers.codecollab-frontend.priority=1"
      - "traefik.http.routers.codecollab-frontend.service=codecollab-frontend"
      - "traefik.http.services.codecollab-frontend.loadbalancer.server.url=http://51.255.196.185:30080"
      
      # Session API
      - "traefik.http.routers.codecollab-session.rule=Host(`codecollab.k4scloud.com`) && PathPrefix(`/api/sessions`)"
      - "traefik.http.routers.codecollab-session.entrypoints=websecure"
      - "traefik.http.routers.codecollab-session.tls.certresolver=letsencrypt"
      - "traefik.http.routers.codecollab-session.priority=10"
      - "traefik.http.routers.codecollab-session.middlewares=codecollab-session-strip"
      - "traefik.http.routers.codecollab-session.service=codecollab-session"
      - "traefik.http.middlewares.codecollab-session-strip.stripprefix.prefixes=/api"
      - "traefik.http.services.codecollab-session.loadbalancer.server.url=http://51.255.196.185:30001"
      
      # Execution API
      - "traefik.http.routers.codecollab-execution.rule=Host(`codecollab.k4scloud.com`) && PathPrefix(`/api/execute`)"
      - "traefik.http.routers.codecollab-execution.entrypoints=websecure"
      - "traefik.http.routers.codecollab-execution.tls.certresolver=letsencrypt"
      - "traefik.http.routers.codecollab-execution.priority=10"
      - "traefik.http.routers.codecollab-execution.middlewares=codecollab-execution-strip"
      - "traefik.http.routers.codecollab-execution.service=codecollab-execution"
      - "traefik.http.middlewares.codecollab-execution-strip.stripprefix.prefixes=/api"
      - "traefik.http.services.codecollab-execution.loadbalancer.server.url=http://51.255.196.185:30002"
      
      # Collaboration WebSocket
      - "traefik.http.routers.codecollab-ws.rule=Host(`codecollab.k4scloud.com`) && PathPrefix(`/ws`)"
      - "traefik.http.routers.codecollab-ws.entrypoints=websecure"
      - "traefik.http.routers.codecollab-ws.tls.certresolver=letsencrypt"
      - "traefik.http.routers.codecollab-ws.priority=10"
      - "traefik.http.routers.codecollab-ws.service=codecollab-ws"
      - "traefik.http.services.codecollab-ws.loadbalancer.server.url=http://51.255.196.185:30003"

networks:
  traefik-network:
    external: true
